# Audio Stage II — IEMOCAP, Bi-GRU + self-attention over Stage I audio features
# Paper target (Table I, audio Stage II): weighted F1 = 0.7795
#
# Reuses src/train_stage2.py and src/models/text_stage2.py — only the
# input_dim and features_path change (audio Stage I hidden dim = 768).

run_name: iemocap_audio_stage2
seed: 42
output_dir: outputs/iemocap_audio_stage2

dataset:
  manifest_dir: data/manifests/iemocap
  # Built by scripts/extract_audio_stage1_features.py
  features_path: data/cache/iemocap_audio_features_stage1.pt
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  input_dim: 768           # audio Stage I output (WavLM-base hidden)
  gru_hidden: 384          # Bi-GRU output dim = 768 (matches input_dim, divisible by 8)
  gru_layers: 2
  num_heads: 8             # 768 / 8 = 96 per head
  dropout: 0.5
  num_labels: 4

train:
  epochs: 100
  batch_size: 8
  eval_batch_size: 16
  learning_rate: 5.0e-5    # same as text Stage II 'D' config
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: false
  early_stopping_patience: 20
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: merits-l-text
  log_every: 10
