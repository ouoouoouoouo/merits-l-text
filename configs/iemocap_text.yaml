# Stage I — Text-only, IEMOCAP (4-way: ang / hap+exc / sad / neu)
# Paper target: weighted F1 = 69.84 (Stage I), 83.85 (Stage II adds Bi-GRU/self-attn).
# These hyperparameters mirror Sec. IV-B of the paper.

run_name: iemocap_text_stage1
seed: 42
output_dir: outputs/iemocap_text_stage1

dataset:
  name: iemocap
  root: ${oc.env:IEMOCAP_ROOT,/path/to/IEMOCAP_full_release}
  manifest_dir: data/manifests/iemocap
  # session 5 = test, session 1 = val, sessions 2-4 = train (paper)
  train_sessions: [2, 3, 4]
  val_sessions: [1]
  test_sessions: [5]
  # merge `exc` into `hap` and keep {ang, hap, sad, neu} per the paper.
  label_map:
    ang: 0
    hap: 1
    exc: 1
    sad: 2
    neu: 3
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  name: roberta_text_classifier
  # Set to a local checkpoint path (e.g. outputs/pretrain_msp/best) to use the
  # MSP-PODCAST pre-trained RoBERTa-FT. Use "roberta-large" to start from
  # HuggingFace pretrained weights without LLM pre-training (will under-perform
  # the paper by ~5 F1 on IEMOCAP).
  pretrained: roberta-large
  num_labels: 4
  dropout: 0.1
  freeze_encoder: false
  max_length: 128

train:
  epochs: 50
  batch_size: 32
  eval_batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: true
  early_stopping_patience: 8
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 4

logging:
  use_wandb: false   # flip on with WANDB_API_KEY set
  wandb_project: merits-l-text
  log_every: 50
