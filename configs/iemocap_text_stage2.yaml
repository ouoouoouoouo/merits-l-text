# Stage II — Text-only, IEMOCAP (4-way)
# Paper target: weighted F1 = 83.85 (text Stage II), +14 points over Stage I.

run_name: iemocap_text_stage2
seed: 42
output_dir: outputs/iemocap_text_stage2

dataset:
  # Built by scripts/preprocess_iemocap.py (already done in Stage I).
  manifest_dir: data/manifests/iemocap
  # Built by scripts/extract_text_features.py from the Stage I best checkpoint.
  features_path: data/cache/iemocap_text_features.pt
  num_labels: 4
  label_names: [angry, happy, sad, neutral]

model:
  # === "D" config — verified best across 4 seeds (mean 0.8209 ± 0.004) ===
  # vs original baseline (256/1/4/0.3) which gave 0.8081 ± 0.0117 (3× more variance).
  # See sweep results in scripts/sweep_stage2.sh history.
  input_dim: 1024          # RoBERTa-large hidden size
  gru_hidden: 512          # Bi-GRU output dim = 2 * gru_hidden = 1024
  gru_layers: 2            # 2-layer + between-layer dropout
  num_heads: 8             # 1024 / 8 = 128 per head
  dropout: 0.5             # heavier reg works with bigger model
  num_labels: 4

train:
  epochs: 100              # was 50; longer training pairs with smaller lr
  batch_size: 8
  eval_batch_size: 16
  # Bigger model needs smaller lr (1e-4 collapsed the 512-hidden variant).
  # See sweep: A_big (lr=1e-4, hidden=512) → 0.7755 vs D (lr=5e-5) → 0.8209.
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  optimizer: adamw
  scheduler: linear
  grad_clip: 1.0
  fp16: false
  early_stopping_patience: 20
  save_best_metric: weighted_f1
  save_best_split: val
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: merits-l-text
  log_every: 10
